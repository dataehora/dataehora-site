name: Cache Busting

on:
  push:
    branches: [main]
    paths:
      - 'css/**'
      - 'js/**'

jobs:
  cache-bust:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update cache-busting hashes in HTML files
        run: |
          CSS_HASH=$(md5sum css/styles.css | cut -c1-8)
          JS_HOLIDAYS_HASH=$(md5sum js/holidays.js | cut -c1-8)
          JS_SCRIPTS_HASH=$(md5sum js/scripts.js | cut -c1-8)

          find . -name "*.html" -not -path "./.git/*" | while read f; do
            sed -i \
              -e "s|href=\"/css/styles\.css[^\"]*\"|href=\"/css/styles.css?v=${CSS_HASH}\"|g" \
              -e "s|href='/css/styles\.css[^']*'|href='/css/styles.css?v=${CSS_HASH}'|g" \
              -e "s|src=\"/js/holidays\.js[^\"]*\"|src=\"/js/holidays.js?v=${JS_HOLIDAYS_HASH}\"|g" \
              -e "s|src='/js/holidays\.js[^']*'|src='/js/holidays.js?v=${JS_HOLIDAYS_HASH}'|g" \
              -e "s|src=\"/js/scripts\.js[^\"]*\"|src=\"/js/scripts.js?v=${JS_SCRIPTS_HASH}\"|g" \
              -e "s|src='/js/scripts\.js[^']*'|src='/js/scripts.js?v=${JS_SCRIPTS_HASH}'|g" \
              "$f"
          done

      - name: Commit changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update cache-busting hashes [skip ci]"
            git push
          fi
