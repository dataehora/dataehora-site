    <script>
        // ── City definitions ────────────────────────────────────────────────
        const cities = {
            brasil: [
                { name: 'Brasília',            flag: '🇧🇷', tz: 'America/Sao_Paulo'              },
                { name: 'Manaus',              flag: '🇧🇷', tz: 'America/Manaus'                 },
                { name: 'Fortaleza',           flag: '🇧🇷', tz: 'America/Fortaleza'              },
                { name: 'Fernando de Noronha', flag: '🇧🇷', tz: 'America/Noronha'               },
            ],
            lusofonia: [
                { name: 'Lisboa',   flag: '🇵🇹', tz: 'Europe/Lisbon'        },
                { name: 'Porto',    flag: '🇵🇹', tz: 'Europe/Lisbon'        },
                { name: 'Luanda',   flag: '🇦🇴', tz: 'Africa/Luanda'        },
                { name: 'Maputo',   flag: '🇲🇿', tz: 'Africa/Maputo'        },
                { name: 'Praia',    flag: '🇨🇻', tz: 'Atlantic/Cape_Verde'  },
                { name: 'São Tomé', flag: '🇸🇹', tz: 'Africa/Sao_Tome'     },
                { name: 'Bissau',   flag: '🇬🇼', tz: 'Africa/Bissau'       },
                { name: 'Dili',     flag: '🇹🇱', tz: 'Asia/Dili'           },
            ],
            mundo: [
                { name: 'Londres',          flag: '🇬🇧', tz: 'Europe/London'                        },
                { name: 'Paris',            flag: '🇫🇷', tz: 'Europe/Paris'                         },
                { name: 'Madrid',           flag: '🇪🇸', tz: 'Europe/Madrid'                        },
                { name: 'Berlim',           flag: '🇩🇪', tz: 'Europe/Berlin'                        },
                { name: 'Moscou',           flag: '🇷🇺', tz: 'Europe/Moscow'                        },
                { name: 'Dubai',            flag: '🇦🇪', tz: 'Asia/Dubai'                           },
                { name: 'Índia',            flag: '🇮🇳', tz: 'Asia/Kolkata'                         },
                { name: 'Pequim',           flag: '🇨🇳', tz: 'Asia/Shanghai'                        },
                { name: 'Tóquio',           flag: '🇯🇵', tz: 'Asia/Tokyo'                           },
                { name: 'Sydney',           flag: '🇦🇺', tz: 'Australia/Sydney'                     },
                { name: 'Nova York',        flag: '🇺🇸', tz: 'America/New_York'                     },
                { name: 'Chicago',          flag: '🇺🇸', tz: 'America/Chicago'                      },
                { name: 'Los Angeles',      flag: '🇺🇸', tz: 'America/Los_Angeles'                  },
                { name: 'Buenos Aires',     flag: '🇦🇷', tz: 'America/Argentina/Buenos_Aires'       },
                { name: 'Santiago',         flag: '🇨🇱', tz: 'America/Santiago'                     },
                { name: 'Cidade do México', flag: '🇲🇽', tz: 'America/Mexico_City'                  },
            ],
        };

        // ── Formatters (reused across ticks) ───────────────────────────────
        const timeFmts = {};
        const dateFmts = {};

        function getTimeFmt(tz) {
            if (!timeFmts[tz]) {
                timeFmts[tz] = new Intl.DateTimeFormat('pt-BR', {
                    hour: '2-digit', minute: '2-digit', second: '2-digit',
                    hour12: false, timeZone: tz
                });
            }
            return timeFmts[tz];
        }

        function getDateFmt(tz) {
            if (!dateFmts[tz]) {
                dateFmts[tz] = new Intl.DateTimeFormat('pt-BR', {
                    weekday: 'short', day: '2-digit', month: 'short', year: 'numeric',
                    timeZone: tz
                });
            }
            return dateFmts[tz];
        }

        // ── Get UTC offset string for a timezone ───────────────────────────
        function getUtcOffset(tz, now) {
            try {
                const parts = new Intl.DateTimeFormat('en', {
                    timeZoneName: 'shortOffset',
                    timeZone: tz
                }).formatToParts(now);
                const tzPart = parts.find(p => p.type === 'timeZoneName');
                if (tzPart) return tzPart.value.replace('GMT', 'UTC');
                return '';
            } catch (e) {
                return '';
            }
        }

        // ── Get local hour in given timezone ───────────────────────────────
        function getLocalHour(tz, now) {
            const parts = new Intl.DateTimeFormat('en-US', {
                hour: 'numeric', hour12: false, timeZone: tz
            }).formatToParts(now);
            const h = parts.find(p => p.type === 'hour');
            return h ? parseInt(h.value, 10) : 12;
        }

        // ── Build card DOM elements ─────────────────────────────────────────
        function buildCard(city, groupClass) {
            const card = document.createElement('div');
            card.className = 'clock-card' + (groupClass ? ' ' + groupClass : '');
            card.dataset.tz = city.tz;

            const cityRow = document.createElement('div');
            cityRow.className = 'card-city';
            cityRow.innerHTML = '<span class="card-flag">' + city.flag + '</span>' +
                                '<span>' + city.name + '</span>';

            const timeEl = document.createElement('div');
            timeEl.className = 'card-time';

            const dateEl = document.createElement('div');
            dateEl.className = 'card-date';

            const footerRow = document.createElement('div');
            footerRow.className = 'card-footer-row';

            const utcEl = document.createElement('span');
            utcEl.className = 'card-utc';

            const dayNightEl = document.createElement('span');
            dayNightEl.className = 'card-daynight';

            footerRow.appendChild(utcEl);
            footerRow.appendChild(dayNightEl);

            card.appendChild(cityRow);
            card.appendChild(timeEl);
            card.appendChild(dateEl);
            card.appendChild(footerRow);

            // Store references for fast updates
            card._timeEl    = timeEl;
            card._dateEl    = dateEl;
            card._utcEl     = utcEl;
            card._dayNightEl = dayNightEl;
            card._lastUtc   = null;
            card._lastDate  = null;

            return card;
        }

        // ── Render all cards into their grids ──────────────────────────────
        const cardRefs = [];

        function renderGrids() {
            const groups = [
                { key: 'brasil',    gridId: 'grid-brasil',    cls: 'clock-card--brasil'    },
                { key: 'lusofonia', gridId: 'grid-lusofonia', cls: 'clock-card--lusofonia' },
                { key: 'mundo',     gridId: 'grid-mundo',     cls: ''                      },
            ];

            groups.forEach(g => {
                const grid = document.getElementById(g.gridId);
                cities[g.key].forEach(city => {
                    const card = buildCard(city, g.cls);
                    grid.appendChild(card);
                    cardRefs.push(card);
                });
            });
        }

        // ── Tick: update all cards ──────────────────────────────────────────
        function tick() {
            const now = new Date();

            cardRefs.forEach(card => {
                const tz = card.dataset.tz;

                // Time (updates every second)
                card._timeEl.textContent = getTimeFmt(tz).format(now);

                // Date (cache — only recalculate when it changes)
                const dateStr = getDateFmt(tz).format(now);
                if (dateStr !== card._lastDate) {
                    card._dateEl.textContent = dateStr;
                    card._lastDate = dateStr;
                }

                // UTC offset (cache — rarely changes, only at DST transitions)
                const utcStr = getUtcOffset(tz, now);
                if (utcStr !== card._lastUtc) {
                    card._utcEl.textContent = utcStr;
                    card._lastUtc = utcStr;
                }

                // Day/night indicator
                const h = getLocalHour(tz, now);
                card._dayNightEl.textContent = (h >= 6 && h < 18) ? '🌞' : '🌙';
            });
        }

        // ── Init ───────────────────────────────────────────────────────────
        renderGrids();
        tick();
        setInterval(tick, 1000);
    </script>
